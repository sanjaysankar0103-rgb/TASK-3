<!DOCTYPE html>
<html>
<head>
    <title>Simple Login</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 150px;
            background-color: lightblue;
        }

        input {
            width: 250px;
            padding: 10px;
            margin: 10px;
        }

        button {
            width: 270px;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <h2>Login Page</h2>

    <form>
        <input type="text" placeholder="Username"><br>
        <input type="password" placeholder="Password"><br>
        <button>Login</button>
    </form>

</body>
</html>
