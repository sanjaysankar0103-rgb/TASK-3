<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>CSS TRANSTITION</h1>

    <style> 
div {
  width: 100px;
  height: 100px;
  background: rgb(16, 81, 219);
  transition-property: width, height;
  transition-duration: 5s;
}

div:hover {
  width: 300px;
  background: yellow;
  height: 300px;
}
</style>
</head>
<body>
<div></div>

</body>
</html>
